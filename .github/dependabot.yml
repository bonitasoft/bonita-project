version: 2
updates:

  # Maintain dependencies for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "10.0.x"  # OLDEST_SUPPORTED_BRANCH
    schedule:
      interval: "daily"
    commit-message:
      prefix: "chore"
      include: "scope"

  # Maintain dependencies for maven
  - package-ecosystem: "maven" 
    directory: "/" 
    target-branch: dev
    schedule:
      interval: "daily"
    commit-message:
      prefix: "chore"
      include: "scope"
