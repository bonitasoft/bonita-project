name: Update Version

on:
  workflow_call:
    inputs:
      version:
        type: string
        description: "Bonita technical version (e.g. 10.1.0.beta-01)"
        required: true
      brandingVersion:
        type: string
        description: "Bonita branding version (e.g. 2024.2-b1)"
        required: true
      merge-upstream-ignoring-conflicts:
        type: boolean
        default: false
    secrets:
      KSM_CONFIG:
        required: true
      BONITA_CI_PAT:
        required: true

jobs:
  update-version:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.ref }}
          repository: bonitasoft/bonita-project
          token: ${{ secrets.BONITA_CI_PAT }}

      - name: Setup Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Setup Maven
        uses: bonitasoft/maven-settings-action@3278c15e4023d52bc12da9d4e1a8b49a80b40559 # v1.4.0
        with:
          keeper-secret-config: ${{ secrets.KSM_CONFIG }}

      - name: Git Setup
        uses: bonitasoft/git-setup-action@9593cf641830d8eadee52875d064ab6903b8b149 # v1.1.0
        with:
          keeper-secret-config: ${{ secrets.KSM_CONFIG }}

      - name: Update version
        run: |
          ./mvnw -ntp versions:set -DnewVersion=${{ inputs.version }} -Ptests
          ./mvnw -ntp -f parent versions:set-property -Dproperty=branding.version -DnewVersion=${{ inputs.brandingVersion }}
          ./mvnw -ntp -f parent versions:set-property -Dproperty=bonita.runtime.version -DnewVersion=${{ inputs.version }}

      # Add [ignore-conflicts] keyword to commit body message to be read by merge_upstream workflow
      - name: Commit and push changes
        run: |
          git commit -a \
            -m "chore(versioning): update version to ${{ inputs.brandingVersion }} (${{ inputs.version }})" \
            ${{ inputs.merge-upstream-ignoring-conflicts && '-m "[ignore-conflicts]"' || '' }}
          git push
